# Agent Gateway Configuration
# Start with: agent serve

# Server settings
server:
  host: 0.0.0.0
  port: 8080
  response_timeout: 60.0
  uvicorn: !include './uvicorn.yaml'

# LLM backend (for agent completions)
llm: !include './llm.yaml'

# Learning backend (for facts, feedback)
# Each agent specifies its own profile in agent YAML
learn:
  db: !include './infra.yaml#dbs.main'
  embedder_url: http://localhost:8001/v1  # Optional: Enable for RAG/semantic search (set via EMBEDDER_URL env)
  #embedder_url: http://localhost:18001/v1  # Optional: Enable for RAG/semantic search (set via EMBEDDER_URL env)
  adapters: !include './.env.yaml#adapters'
  training:
    default_profiles:
      sft:
        epochs: 3
        batch_size: 4
        learning_rate: 0.0002
      dpo:
        beta: 0.1
        epochs: 3
        batch_size: 4
        learning_rate: 0.0002

# Agent definitions
agents:
  #codebase-qna: !include './agents/codebase-qna.yaml'
  #jokester: !include './agents/jokester.yaml'
  jokester-p: !include './agents/jokester-p.yaml'

# Appinfra logging (optional, uses defaults if not specified)
logging: !include './infra.yaml#logging'
