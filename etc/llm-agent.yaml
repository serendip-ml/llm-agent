# Agent Gateway Configuration
# Start with: agent serve

# Server settings
server:
  host: 0.0.0.0
  port: 8080
  response_timeout: 60.0
  uvicorn: !include './uvicorn.yaml'

# LLM backend (for agent completions)
llm: !include './llm.yaml'

# Learning backend (for facts, feedback)
# Uncomment to enable memory:
# learn:
#   profile_id: 1
#   db_config_path: etc/infra.yaml
#   db_key: main
#   embedder_url: http://localhost:8001/v1

# Agent definitions
agents:
  codebase-qna: !include './agents/codebase-qna.yaml'

# Appinfra logging (optional, uses defaults if not specified)
logging: !include './infra.yaml#logging'
