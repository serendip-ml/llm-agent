# Programmatic Agent Manifest
type: programmatic

# Module containing Factory class (required)
module: llm_agent.agents.jokester_p
factory: Factory

# Learning profile - where this agent's memory is stored
identity:
  name: "jokester-p"

max_retries: 0
similarity_threshold: 0.85

denylist:
  - hipster
  - millennial
  - avocado toast
  - participation trophy
  - selfie

# Agent-specific LLM config (merged with global llm.yaml)
llm:
  backends:
    local:
      adapter_id: jokester-p

# Directive prompt (agent personality)
directive: |
  You are a joke teller who develops a personal sense of humor over time.

  You learn what lands and what doesn't. You recall previous jokes and the
  reactions they got, and you use that to refine your style. You never repeat
  a joke. You have range — puns, one-liners, observational humor, absurdist
  bits — but you gravitate toward whatever gets the best response.

  You keep it short. A joke should fit in a text message.

  IMPORTANT: Every joke must be COMPLETE with both setup AND punchline.
  Never output just a question without an answer. A question like
  "Why did the chicken cross the road?" is NOT a joke - it needs the punchline.

# Task definition (for documentation/context only - agent logic is in code)
task:
  description: |
    Tell one short, original joke with guaranteed novelty checking.

    This is a programmatic agent - the logic is in Python code, not prompts.
    The agent enforces "never repeat" across thousands of jokes using
    embedding-based similarity search, which is not reliably achievable
    through prompt-based instructions alone.

schedule:
  interval: 43200  # Every 12 hours (override: INFRA_AGENTS_JOKESTER_P_SCHEDULE_INTERVAL=60)

# Automated rating configuration
rating:
  providers:
    - type: llm
      backend: !include '../llm.yaml#backends.anthropic'
      enabled: true
  models:
    atomic:
      solution:
        prompt: |
          Rate this joke 1-5 stars. Compare against these reference jokes:

          ★★★★★ 5 - EXCEPTIONAL (you'd remember and share this)
             "I failed math so many times at school, I can't even count."
             "Light travels faster than sound. This is why some people appear bright until they open their mouths."

          ★★★★ 4 - CLEVER (double meaning that actually works)
             "I went to buy some camo pants but couldn't find any."
             "Did you hear about the guy who opened a gym? It didn't work out."
             "My father is allergic to cotton. He has pills but can't get them out of the bottle."

          ★★★ 3 - AVERAGE (basic pun or joke that functions)
             "A horse walks into a bar. The bartender says, 'Why the long face?'"
             "Why does a chicken coop only have two doors? If it had four it would be a sedan."
             "What do you call a bear with no teeth? A gummy bear."

          ★★ 2 - WEAK (forced connection, punchline is a stretch)
             "Did you hear about the cheese factory that exploded in France? Da brie is everywhere."
             "Why did the tree go broke? It lost its leaves."

          ★ 1 - BROKEN (nonsense, no actual joke)
             "What did the grape say to the elephant? Stand up!"
             "Why was 9 afraid of 10? Because 10 was too close."
             "What do you call someone who speaks two languages? Bilingual."

          Compare the joke to the examples above. Which tier is it closest to?
        criteria:
          - name: humor
            description: "Does it make you genuinely laugh or smile? Not just 'I see what you did there'"
            weight: 1.0
          - name: originality
            description: "Is the concept fresh? Penalize heavily for clichés, common pun formats, tired setups"
            weight: 0.9
          - name: appropriateness
            description: "Binary check: If offensive/problematic, set to 0.0. Otherwise 1.0 (don't reward for being safe)"
            weight: 0.2
  batch_size: 5
  auto: false
  # Preference pairing for DPO training
  # Disabled - pairing done at training time via llm-learn CLI for optimal matching
  pairing:
    enabled: false
    # high_threshold: 4  # 4+ stars = "chosen"
    # low_threshold: 2   # 2- stars = "rejected"
    # prompt: "Tell me a {category}."  # Context prompt for preference pairs

# No tools needed - programmatic agent uses LearnTrait/LLMTrait directly
# No conversation config - not using conversation runner
# No events - programmatic agent handles logic directly
