name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          # Internal deps: use develop branch until release, then pin to versions
          python -m pip install "git+https://github.com/serendip-ml/appinfra.git@develop"
          python -m pip install "git+https://github.com/serendip-ml/llm-infer.git@develop"
          python -m pip install "git+https://github.com/serendip-ml/llm-kelt.git@develop"
          python -m pip install "git+https://github.com/serendip-ml/llm-saia.git@develop"

      - name: Check formatting
        run: python -m ruff format --check .

      - name: Lint
        run: python -m ruff check .

      - name: Type check
        run: python -m mypy llm_agent/ --ignore-missing-imports

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          # Internal deps: use develop branch until release, then pin to versions
          python -m pip install "git+https://github.com/serendip-ml/appinfra.git@develop"
          python -m pip install "git+https://github.com/serendip-ml/llm-infer.git@develop"
          python -m pip install "git+https://github.com/serendip-ml/llm-kelt.git@develop"
          python -m pip install "git+https://github.com/serendip-ml/llm-saia.git@develop"

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          # Internal deps: use develop branch until release, then pin to versions
          python -m pip install "git+https://github.com/serendip-ml/appinfra.git@develop"
          python -m pip install "git+https://github.com/serendip-ml/llm-infer.git@develop"
          python -m pip install "git+https://github.com/serendip-ml/llm-kelt.git@develop"
          python -m pip install "git+https://github.com/serendip-ml/llm-saia.git@develop"

      - name: Run tests with coverage
        run: python -m pytest tests/ --cov=llm_agent --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
